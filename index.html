<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Assistant</title>
    <meta name="description"
        content="Alexa-style voice assistant with live speech transcription and interactive orb interface.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-box">
            <h2 id="auth-title">Welcome Back</h2>
            <p id="auth-subtitle">Log in to continue your conversations.</p>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="auth-submit-btn">Log In</button>
                <p class="auth-switch" id="auth-switch-text">
                    Don't have an account? <span id="toggle-auth">Sign up</span>
                </p>
                <p id="auth-error" class="error-text"></p>
            </form>
        </div>
    </div>

    <!-- Main App Structure -->
    <div class="app-container" id="app-container" style="display: none;">

        <!-- Sidebar Overlay (hidden by default, slides in) -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>History</h2>
                <button class="icon-btn" id="close-sidebar-btn" title="Close">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="thread-list" id="thread-list">
                <!-- Threads injected here by JS -->
            </div>
            <div class="sidebar-footer">
                <span id="user-display"></span>
                <button id="logout-btn" class="text-btn">Log out</button>
            </div>
        </aside>

        <!-- Full-screen Voice Area -->
        <main class="main-voice voice-mode" id="main-voice">

            <!-- Top Bar -->
            <div class="top-bar">
                <!-- Left: Hamburger -->
                <button class="icon-btn hamburger-btn" id="toggle-sidebar" title="History">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>

                <!-- Center: Session title (hidden ref for JS) -->
                <span class="top-bar-title" id="current-thread-title">Voice Assistant</span>

                <!-- Right Actions -->
                <div class="top-bar-actions">
                    <!-- Back to Voice Button -->
                    <button class="icon-btn back-to-voice-btn" id="back-to-voice-btn" title="Back to Voice Mode">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="22"></line>
                        </svg>
                    </button>

                    <!-- Theme Toggle -->
                    <button class="icon-btn theme-toggle" id="theme-toggle" title="Toggle Theme">
                        <svg id="theme-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <!-- Moon Icon (initial dark mode) -->
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>

                    <!-- New Session -->
                    <button class="new-session-btn" id="new-chat-btn" title="New Session">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>New Session</span>
                    </button>
                </div>
            </div>

            <!-- Centered Orb Area (directly on page, no card) -->
            <div class="voice-center">

                <!-- Status Badge -->
                <div class="status-badge" id="orb-status">TAP TO START</div>

                <!-- Orb -->
                <div class="orb-wrap">
                    <div class="orb-ring orb-ring-1"></div>
                    <div class="orb-ring orb-ring-2"></div>
                    <div class="orb-ring orb-ring-3"></div>

                    <button class="orb" id="mic-btn" aria-label="Microphone" disabled>
                        <svg class="orb-icon" id="mic-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="20" cy="50" r="8" fill="currentColor"
                                style="animation: wave-dot 1.2s ease-in-out infinite; animation-delay:0s;" />
                            <circle cx="40" cy="50" r="8" fill="currentColor"
                                style="animation: wave-dot 1.2s ease-in-out infinite; animation-delay:0.2s;" />
                            <circle cx="60" cy="50" r="8" fill="currentColor"
                                style="animation: wave-dot 1.2s ease-in-out infinite; animation-delay:0.4s;" />
                            <circle cx="80" cy="50" r="8" fill="currentColor"
                                style="animation: wave-dot 1.2s ease-in-out infinite; animation-delay:0.6s;" />
                        </svg>
                    </button>
                </div>

                <!-- Live Transcript -->
                <div class="transcript-live" id="transcript">Select a chat to begin</div>
            </div>

            <!-- Chat Container (messages) -->
            <div id="chat-container">
                <div class="welcome-message" id="welcome-message">
                    <p>Select a chat from the sidebar or start a new one!</p>
                </div>
            </div>
            <div class="visualizer" id="visualizer" style="display:none;">
                <div class="dot red"></div>
                <div class="dot blue"></div>
                <div class="dot green"></div>
                <div class="dot yellow"></div>
            </div>
            <div style="display:none;"><select id="voice-select"></select></div>

        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Sidebar overlay sync — complements the toggle in script.js
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');

        // Watch sidebar for class changes to sync overlay
        const sidebarObserver = new MutationObserver(() => {
            if (sidebar.classList.contains('open')) {
                sidebarOverlay.classList.add('active');
            } else {
                sidebarOverlay.classList.remove('active');
            }
        });
        sidebarObserver.observe(sidebar, { attributes: true, attributeFilter: ['class'] });

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        closeSidebarBtn.addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);

        // --- MODE SWITCHING LOGIC ---
        const mainVoice = document.getElementById('main-voice');
        const backToVoiceBtn = document.getElementById('back-to-voice-btn');
        const newChatBtnTop = document.getElementById('new-chat-btn');

        function setMode(mode) {
            if (mode === 'voice') {
                mainVoice.classList.remove('chat-mode');
                mainVoice.classList.add('voice-mode');
            } else {
                mainVoice.classList.remove('voice-mode');
                mainVoice.classList.add('chat-mode');
            }
        }

        backToVoiceBtn.addEventListener('click', () => setMode('voice'));
        newChatBtnTop.addEventListener('click', () => setMode('voice'));

        // Watch for thread selection to switch to chat mode
        // We'll hook into clicks on thread items after they are loaded
        document.addEventListener('click', (e) => {
            if (e.target.closest('.thread-item')) {
                setMode('chat-mode');
            }
        });

        // --- THEME TOGGLE LOGIC ---
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const sunIcon = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
        const moonIcon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;

        function updateThemeIcon() {
            if (document.body.classList.contains('light-theme')) {
                themeIcon.innerHTML = sunIcon;
            } else {
                themeIcon.innerHTML = moonIcon;
            }
        }

        // Check for saved theme
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
            updateThemeIcon();
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeIcon();
        });
    </script>
</body>

</html>
